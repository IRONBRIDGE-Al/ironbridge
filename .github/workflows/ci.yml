name: IronForge CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check HTML syntax
        run: |
          # Basic HTML validation
          grep -q "<!DOCTYPE html>" public/index.html
          grep -q "</html>" public/index.html
      - name: Check links
        run: |
          # Check for common issues
          grep -q "href=\"https://" public/index.html
      - name: Validate structure
        run: |
          # Count sections exist
          grep -q "id=\"security\"" public/index.html
          grep -q "id=\"privacy\"" public/index.html
          grep -q "id=\"ints\"" public/index.html
          grep -q "id=\"pkgs\"" public/index.html

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Verify build
        run: |
          echo "Build verification for IronForge"
          echo "Ready for Vercel deploy"

name: Verify Vercel Deploy
on:
  workflow_run:
    workflows: ['Force Vercel Deploy']
    types: [completed]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploy
        run: sleep 90
      - name: Check webhook endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://ironbridge-jade.vercel.app/api/deploy-webhook)
          if [ "$STATUS" != '200' ]; then
            curl -s "https://api.telegram.org/bot${{ secrets.TG_BOT }}/sendMessage?chat_id=${{ secrets.TG_CHAT }}&text=VERCEL+DEPLOY+FAILED+status=$STATUS"
            exit 1
          else
            curl -s "https://api.telegram.org/bot${{ secrets.TG_BOT }}/sendMessage?chat_id=${{ secrets.TG_CHAT }}&text=VERCEL+DEPLOY+OK+webhook+live"
          fi
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRONFORGE • IRONBRIDGE | Easy Token Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap');
        :root { --accent: #f97316; }
        * { transition: all 0.3s; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white">
    <nav class="bg-black/95 border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-orange-600 rounded-2xl flex items-center justify-center text-3xl">⚒️</div>
                <div><h1 class="heading-font text-4xl">IRONFORGE</h1><p class="text-xs text-orange-400">IRONBRIDGE</p></div>
            </div>
            <button id="connectBtn" onclick="connectWallet()" class="bg-orange-600 px-8 py-3.5 rounded-3xl font-semibold flex items-center gap-3">
                <span id="connectText">CONNECT WALLET</span>
            </button>
        </div>
    </nav>
    <section class="min-h-screen flex items-center py-24" style="background: linear-gradient(180deg, #0a0a0a 0%, #111 100%);">
        <div class="max-w-7xl mx-auto px-8 grid md:grid-cols-2 gap-16 items-center">
            <div>
                <div class="inline-block bg-orange-500/20 text-orange-400 px-4 py-2 rounded-full text-sm mb-8">BUILT BY IRONBRIDGE • POWERED BY x402 CLOUD</div>
                <h1 class="heading-font text-6xl mb-6">Create Your Own <span class="text-orange-400">Token</span></h1>
                <p class="text-xl text-white/70 mb-10">No coding. Everything shown clearly.</p>
                <a href="#packages" class="bg-orange-600 px-10 py-5 rounded-3xl font-bold inline-block">SEE PACKAGES</a>
            </div>
            <div class="text-center text-9xl">⚒️</div>
        </div>
    </section>
    <section id="packages" class="py-24 bg-[#111]">
        <div class="max-w-7xl mx-auto px-8">
            <h2 class="heading-font text-5xl text-center mb-12">Choose Package</h2>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="bg-[#1a1a1a] p-10 rounded-3xl border border-white/10 hover:-translate-y-4">
                    <div class="text-6xl mb-4">⚡</div>
                    <h3 class="text-5xl">$5</h3>
                    <p class="text-orange-400 mt-2">Starter</p>
                    <button onclick="selectPackage(5)" class="mt-8 w-full py-4 bg-orange-600 rounded-2xl font-bold">CHOOSE</button>
                </div>
                <div class="bg-[#1a1a1a] p-10 rounded-3xl border-2 border-orange-400">
                    <div class="text-xs bg-orange-400 text-black px-3 py-1 rounded-full inline-block mb-4">POPULAR</div>
                    <div class="text-6xl mb-4">🔥</div>
                    <h3 class="text-5xl">$15</h3>
                    <p class="text-orange-400 mt-2">Growth</p>
                    <button onclick="selectPackage(15)" class="mt-8 w-full py-4 bg-orange-600 rounded-2xl font-bold">CHOOSE</button>
                </div>
                <div class="bg-[#1a1a1a] p-10 rounded-3xl border border-white/10 hover:-translate-y-4">
                    <div class="text-6xl mb-4">⚒️</div>
                    <h3 class="text-5xl">$25</h3>
                    <p class="text-orange-400 mt-2">Complete</p>
                    <button onclick="selectPackage(25)" class="mt-8 w-full py-4 bg-orange-600 rounded-2xl font-bold">CHOOSE</button>
                </div>
            </div>
        </div>
    </section>
    <script>
        let userAddress = null;
        async function connectWallet() {
            const btn = document.getElementById('connectBtn');
            const text = document.getElementById('connectText');
            try {
                if (!window.ethereum) { alert('No wallet. Install MetaMask.'); return; }
                text.textContent = 'CONNECTING...';
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                userAddress = await signer.getAddress();
                text.innerHTML = '✅ ' + userAddress.slice(0,6) + '...';
                btn.classList.remove('bg-orange-600');
                btn.classList.add('bg-green-600');
                alert('Connected: ' + userAddress);
            } catch(e) { alert('Failed'); text.textContent = 'CONNECT WALLET'; }
        }
        function selectPackage(price) {
            if (!userAddress) { alert('Connect wallet first!'); return; }
            alert(price + ' package selected!');
        }
    </script>
</body>
</html>
